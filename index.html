<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AI Partner - Room</title>
    <style>
        /* 画面全体のレイアウト調整（上下50%に強制固定するお守り） */
        html, body {
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            overflow: hidden; /* 画面全体のスクロール（スワイプ）を完全に禁止 */
            position: fixed;  /* iPhone特有の画面のバウンドを防止 */
            background: #7494c4; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; /* 上下に分割 */
        }
        
        /* 3Dアバターが表示される上半分のエリア（常に50%をキープ） */
        #avatar-container { 
            width: 100%;
            height: 50vh; /* 画面の縦幅のちょうど半分に固定 */
            background: #eceff1; 
            position: relative;
            touch-action: none; /* 💡 ここにこの1行を付け足します！ */
        }
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
        }

        /* 案内テキストのスタイル */
        #welcome-msg { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: rgba(255, 255, 255, 0.8); 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-size: 13px; /* 少し文字を小さく調整 */
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: none; 
            z-index: 10; 
        }

        /* スマホで見るときは上下分割に自動切り替えする設定 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #avatar-container { height: 50vh; }
        }
    </style>
    
    <!-- 
      インターネット上（GitHub）で、お互いのバージョンが100%完全に一致する
      本物の「本体」と本物の「GLTFLoader」を、世界で最も安全な配信サイト（unpkg）から自動読み込みします。
      これであなたのPC内のthree.module.jsやGLTFLoader.jsは一切不要になり、バージョン違いのエラーも100%発生しません！
    -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <!-- 左半分：3Dアバターのお部屋 -->
    <div id="avatar-container">
        <div id="welcome-msg">私のお部屋へようこそ！右下のボタンから話しかけてね。</div>
    </div>

    <!-- 右半分（または右下）：Difyチャットが自動で埋め込まれる空間 -->

    <!-- ⬇️ 3Dアバターを動かすプログラム ⬇️ -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const container = document.getElementById('avatar-container');
        const scene = new THREE.Scene();
        
        // カメラの位置（黄金比率）
        const camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.1, 1.2); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio); 
        container.appendChild(renderer.domElement);

        // 照明（アバターを明るく照らす）
        const light = new THREE.DirectionalLight(0xffffff, 3.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // アバター（avatar.vrm）の読み込み
        const loader = new GLTFLoader();
        loader.load(
            './avatar.vrm',
            (gltf) => {
                const model = gltf.scene;
                scene.add(model);
                model.rotation.y = 0; // まっすぐ正面を向かせます

                // アニメーションループ（ゆらゆら動く呼吸モーションを追加）
                function animate() {
                    requestAnimationFrame(animate);
                    const time = Date.now() * 0.002; 
                    model.position.y = Math.sin(time) * 0.01;
                    renderer.render(scene, camera);
                }
                animate();
                console.log('インターネット上で、本物同士の合体に成功しました！');
            },
            null,
            (error) => console.error('エラー:', error)
        );

        // 画面サイズ自動変更対応
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        // 💡 ここから下の4行を新しく付け足します！
        // アバター画面上での指の動き（スワイプ）を強制的にキャンセルするお守りです
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
    </script>

    <!-- ⬇️ Dify公式のチャット埋め込みコード ⬇️ -->
    <script>
     window.difyChatbotConfig = {
      token: '76UxzBeCsCD94UMJ',
      inputs: {},
      systemVariables: {},
      userVariables: {},
     }
    </script>
    <script
     src="https://udify.app/embed.min.js"
     id="76UxzBeCsCD94UMJ"
     defer>
    </script>
    <style>
      /* チャットボタンの位置を調整 */
      #dify-chatbot-bubble-button {
        background-color: #5c7bb0 !important; 
        bottom: 15px !important; 
        right: 15px !important;
      }
      
      /* チャットウィンドウを「画面の下半分（50%）」にピッタリ固定する設定 */
      #dify-chatbot-bubble-window {
        width: 100vw !important;     /* 横幅をスマホ画面いっぱいに広げる */
        height: 40vh !important;    /* 縦幅を画面のちょうど半分に固定 */
        max-width: 100% !important;
        max-height: 40vh !important;
        bottom: 0 !important;       /* 画面の一番下に隙間なくピタッとくっつける */
        right: 0 !important;
        border-radius: 20px 20px 0 0 !important; /* 上側だけ丸みをつけてオシャレに */
        box-shadow: 0 -5px 15px rgba(0,0,0,0.1) !important;
      }

      /* Dify内部の文字サイズを小さくし、文字間・行間をキュッと狭める設定 */
      iframe {
        font-size: 13px !important;         /* 文字を全体的に少し小さく */
        letter-spacing: -0.02em !important; /* 文字の間隔をキュッと狭める */
        line-height: 1.3 !important;        /* 行の間隔を狭めてコンパクトに */
      }
    </style>
</body>
</html>
